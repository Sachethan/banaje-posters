  <style>
    /* CSS Variables for consistent theming */
    :root {
      --bg-color: #f4f6f8;
      --card-bg: #ffffff;
      --text-primary: #333d47;
      --text-secondary: #6c757d;
      --accent-teal: #1abc9c;
      --accent-red: #e74c3c;
      --accent-green: #2ecc71;
      --accent-blue: #3498db;
      --border-color: #e0e0e0;
      --shadow-light: 0 4px 6px rgba(0, 0, 0, 0.05);
      --shadow-hover: 0 6px 12px rgba(0, 0, 0, 0.1);
    }

    /* Base Body Styles */
    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg-color);
      color: var(--text-primary);
      margin: 0;
      padding: 2rem;
      line-height: 1.6;
    }

    /* Main Heading */
    h2 {
      text-align: center;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
      margin-top: 0;
      font-weight: 600;
      font-size: 0.5rem;
    }

    /* Top Action Bar Layout */
    .action-bar {
      display: flex;
      flex-wrap: wrap; /* Allow wrapping for responsiveness */
      justify-content: center; /* Center buttons */
      align-items: center; /* Align items vertically */
      gap: 0.75rem;
      margin-bottom: 2rem;
      max-width: 1000px; /* Max width for better readability on large screens */
      margin-left: auto;
      margin-right: auto;
      padding: 1rem;
      background: var(--card-bg);
      border-radius: 12px;
      box-shadow: var(--shadow-light);
    }

    /* Input Field Styling */
    input[type="text"],
    input[type="date"] {
      flex-grow: 1; /* Allow search input to grow */
      min-width: 180px; /* Minimum width for search input */
      padding: 0.75rem;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      font-family: 'Poppins', sans-serif;
      font-size: 1rem;
      color: var(--text-primary);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      box-sizing: border-box; /* Include padding in width */
    }
    
    input[type="text"]:focus,
    input[type="date"]:focus {
      outline: none;
      border-color: var(--accent-teal);
      box-shadow: 0 0 0 3px rgba(26, 188, 156, 0.2);
    }

    /* Button Styling - Smaller */
    .btn {
      padding: 0.5rem 1rem; /* Smaller padding */
      border: none;
      background: var(--accent-teal);
      color: white;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem; /* Smaller font size */
      transition: background-color 0.2s ease, transform 0.1s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      white-space: nowrap; /* Prevent text wrapping on buttons */
    }

    .btn:hover {
      background: #16a085;
    }
    
    .btn:active {
      transform: translateY(1px);
    }

    .btn.danger { background: var(--accent-red); }
    .btn.danger:hover { background: #c0392b; }
    .btn.update { background: var(--accent-green); }
    .btn.update:hover { background: #27ae60; }
    .btn.filter-btn { background: var(--accent-blue); } /* Specific for filter trigger */
    .btn.filter-btn:hover { background: #2980b9; }
    .btn.reset { background: var(--text-secondary); }
    .btn.reset:hover { background: #5a6268; }

    /* Entry Card Styling */
    .entry-card {
      background: var(--card-bg);
      border-radius: 12px;
      box-shadow: var(--shadow-light);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      transition: box-shadow 0.2s ease;
      max-width: 1000px;
      margin-left: auto;
      margin-right: auto;
      
      /* Animation properties */
      opacity: 0; /* Start hidden */
      transform: translateY(20px); /* Start slightly below */
      transition: opacity 0.5s ease-out, transform 0.5s ease-out; /* Smooth transition */
    }

    .entry-card.show {
      opacity: 1;
      transform: translateY(0);
    }
    
    .entry-card:hover {
      box-shadow: var(--shadow-hover);
    }
    
    .entry-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border-color);
      margin-bottom: 1rem;
    }
    
    .entry-header strong {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-primary);
    }
    
    .toggle-btn {
      background: none;
      border: none;
      font-size: 1.2rem;
      color: var(--text-secondary);
      transition: transform 0.3s ease;
      cursor: pointer;
      padding: 0.25rem;
    }
    
    .entry-content {
      display: none;
      margin-top: 1.5rem;
    }
    
    .entry-content.expanded {
      display: block;
    }
    
    .toggle-btn.expanded i {
      transform: rotate(90deg);
    }

    /* Form Group Styling */
    .form-group {
      margin-bottom: 1rem;
    }
    
    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.25rem;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    /* Action Buttons within Card */
    .card-actions {
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border-color);
    }

    /* Modal Styles */
    .modal-overlay, .message-box-overlay {
      display: flex; /* Keep flex for centering */
      position: fixed; /* Stay in place */
      z-index: 1000; /* Sit on top */
      left: 0;
      top: 0;
      width: 100%; /* Full width */
      height: 100%; /* Full height */
      overflow: auto; /* Enable scroll if needed */
      background-color: rgba(0,0,0,0.4); /* Black w/ opacity */
      justify-content: center;
      align-items: center;

      /* Animation properties */
      visibility: hidden; /* Hidden by default for transition */
      opacity: 0; /* Start transparent */
      transition: opacity 0.3s ease-out, visibility 0.3s ease-out;
    }

    .modal-overlay.show, .message-box-overlay.show {
      visibility: visible;
      opacity: 1;
    }

    /* Modal Content Animation (for slide-in effect) */
    .modal-content, .message-box-content {
      transform: scale(0.95); /* Start slightly smaller */
      transition: transform 0.3s ease-out;
    }

    .modal-overlay.show .modal-content,
    .message-box-overlay.show .message-box-content {
      transform: scale(1); /* Scale to normal size */
    }

    .modal-content {
      background-color: var(--card-bg);
      margin: auto;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: var(--shadow-hover);
      width: 90%; /* Responsive width */
      max-width: 500px; /* Max width for modal */
      position: relative;
    }

    .modal-content h3 {
      margin-top: 0;
      margin-bottom: 1.5rem;
      color: var(--text-primary);
      text-align: center;
    }

    .modal-close-btn {
      color: var(--text-secondary);
      position: absolute;
      top: 1rem;
      right: 1.5rem;
      font-size: 1.5rem;
      font-weight: bold;
      cursor: pointer;
      transition: color 0.2s ease;
    }

    .modal-close-btn:hover,
    .modal-close-btn:focus {
      color: var(--accent-red);
      text-decoration: none;
      cursor: pointer;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.75rem;
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border-color);
    }

    /* Custom Message Box Styles */
    /* .message-box-overlay styles are combined with .modal-overlay */
    .message-box-content p {
      margin-bottom: 1.5rem;
      font-size: 1.1rem;
      color: var(--text-primary);
    }

    .message-box-content {
      background-color: var(--card-bg);
      padding: 2rem;
      border-radius: 12px;
      box-shadow: var(--shadow-hover);
      text-align: center;
      max-width: 400px;
      position: relative;
    }

    .message-box-actions {
      display: flex;
      justify-content: center;
      gap: 1rem;
    }

    /* Duplicate Info Div */
    .duplicate-info {
      background: #e9f5f5; /* Light teal background */
      border: 1px solid #cce7e7;
      border-radius: 8px;
      padding: 0.75rem 1.25rem;
      margin-bottom: 1.5rem;
      max-width: 1000px;
      margin-left: auto;
      margin-right: auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.95rem;
      color: var(--text-primary);
      box-shadow: var(--shadow-light);
      transition: box-shadow 0.2s ease;
      cursor: pointer; /* Make it clear its clickable */

      /* Animation properties */
      opacity: 0; /* Start hidden */
      transform: translateY(20px); /* Start slightly below */
      transition: opacity 0.5s ease-out, transform 0.5s ease-out; /* Smooth transition */
    }

    .duplicate-info.show {
      opacity: 1;
      transform: translateY(0);
    }

    .duplicate-info:hover {
      box-shadow: var(--shadow-hover);
      background: #d4eded; /* Slightly darker on hover */
    }

    .duplicate-info p {
      margin: 0;
      font-weight: 500;
    }

    /* Loading Spinner */
    .loading-spinner {
      border: 4px solid rgba(0, 0, 0, 0.1);
      border-left-color: var(--accent-teal);
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
      display: inline-block;
      vertical-align: middle;
      margin-right: 10px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }


    /* Responsive adjustments */
    @media (max-width: 768px) {
      body { padding: 1rem; }
      h2 { font-size: 1.75rem; }
      .action-bar { 
         /* Stack items on smaller screens */
        padding: 0.75rem;
      }
      .action-bar input[type="text"] {
        width: 100%; /* Full width for search input */
      }
      .btn {
        width: auto; /* Full width for stacked buttons */
      }
      .entry-card { padding: 1rem; }
      .entry-header strong { font-size: 1rem; }
      .modal-content {
        padding: 1.5rem;
      }
      .duplicate-info {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.5rem;
      }
    }
  </style>
</head>
<body>

  <h2>Poster Saved Data</h2>

  <div class="action-bar">
    <input type="text" id="searchInput" placeholder="Search name, date, address, season...">
    <button class="btn" onclick="downloadExcel()">
      <i class="fas fa-file-excel"></i> Export to Excel
    </button>
    <button class="btn" onclick="downloadPDF()">
      <i class="fas fa-file-pdf"></i> Export to PDF
    </button>
    <button class="btn filter-btn" onclick="openFilterModal()">
      <i class="fas fa-calendar-alt"></i> Date Filters
    </button>
    <button class="btn reset" onclick="resetAllFilters()">
      <i class="fas fa-undo-alt"></i> Reset
    </button>
  </div>

  <div id="data-container"></div>

  <!-- Filter Modal -->
  <div id="filterModal" class="modal-overlay">
    <div class="modal-content">
      <span class="modal-close-btn" onclick="closeFilterModal()">&times;</span>
      <h3>Apply Date Filters</h3>
      <div class="form-group">
        <label for="modalStartDate">Start Date</label>
        <input type="date" id="modalStartDate">
      </div>
      <div class="form-group">
        <label for="modalEndDate">End Date</label>
        <input type="date" id="modalEndDate">
      </div>
      <div class="modal-actions">
        <button class="btn reset" onclick="resetDateFilters()">
          <i class="fas fa-undo"></i> Reset Dates
        </button>
        <button class="btn filter-btn" onclick="applyFilters()">
          <i class="fas fa-check"></i> Apply
        </button>
      </div>
    </div>
  </div>

  <!-- Custom Message Box -->
  <div id="messageBox" class="message-box-overlay">
    <div class="message-box-content">
      <p id="messageBoxText"></p>
      <div class="message-box-actions">
        <button class="btn" onclick="closeMessageBox()">OK</button>
      </div>
    </div>
  </div>

  <!-- Custom Confirmation Box -->
  <div id="confirmBox" class="message-box-overlay">
    <div class="message-box-content">
      <p id="confirmBoxText"></p>
      <div class="message-box-actions">
        <button class="btn danger" id="confirmNo">No</button>
        <button class="btn update" id="confirmYes">Yes</button>
      </div>
    </div>
  </div>


  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore.js";

    // Firebase configuration and initialization
    const firebaseConfig = {
      apiKey: "AIzaSyCZejpQv-Ru-OlzWsjzFF_37e8b8DIC3u8",
      authDomain: "posterdata-113da.firebaseapp.com",
      projectId: "posterdata-113da",
      storageBucket: "posterdata-113da.appspot.com",
      messagingSenderId: "702186025024",
      appId: "1:702186025024:web:488eec752f7f6c382cefa5",
      measurementId: "G-YQHKJTNHKG"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const container = document.getElementById("data-container");
    const searchInput = document.getElementById("searchInput"); // Main page search input
    const filterModal = document.getElementById("filterModal");
    const modalStartDateInput = document.getElementById("modalStartDate");
    const modalEndDateInput = document.getElementById("modalEndDate");
    const messageBox = document.getElementById("messageBox");
    const messageBoxText = document.getElementById("messageBoxText");
    const confirmBox = document.getElementById("confirmBox");
    const confirmBoxText = document.getElementById("confirmBoxText");
    let resolveConfirm; // To store the promise resolver for confirmation

    let allEntries = []; // Stores all data fetched from Firestore
    let currentFilteredEntries = []; // Stores entries after applying all filters

    /**
     * Formats a date string into YYYY-MM-DD format for input type="date".
     * @param {string} dateString - The date string to format.
     * @returns {string} - The formatted date string (YYYY-MM-DD) or an empty string if invalid.
     */
    function formatDateForInput(dateString) {
      try {
        const date = new Date(dateString);
        if (isNaN(date.getTime())) { // Check for invalid date
          return '';
        }
        const year = date.getFullYear();
        const month = (date.getMonth() + 1).toString().padStart(2, '0');
        const day = date.getDate().toString().padStart(2, '0');
        return `${year}-${month}-${day}`;
      } catch (e) {
        console.warn("Could not parse date string:", dateString, e);
        return ''; // Return empty string for invalid dates
      }
    }
  
  function formatDateForDisplay(dateString) {
  try {
    const date = new Date(dateString);
    if (isNaN(date)) return '';
    const day = date.getDate().toString().padStart(2, '0');
    const month = date.toLocaleString('default', { month: 'short' }); // e.g., "Jul"
    const year = date.getFullYear();
    return `${day}-${month}-${year}`;
  } catch (e) {
    console.warn("Invalid display date format:", dateString, e);
    return '';
  }
}


    /**
     * Displays a custom modal (message box or filter modal).
     * @param {HTMLElement} modalElement - The modal element to show.
     */
    function showModal(modalElement) {
      modalElement.classList.add('show');
    }

    /**
     * Hides a custom modal.
     * @param {HTMLElement} modalElement - The modal element to hide.
     */
    function hideModal(modalElement) {
      modalElement.classList.remove('show');
    }

    /**
     * Displays a custom message box.
     * @param {string} message - The message to display.
     */
    window.showMessageBox = (message) => {
      messageBoxText.textContent = message;
      showModal(messageBox);
    };

    /**
     * Hides the custom message box.
     */
    window.closeMessageBox = () => {
      hideModal(messageBox);
    };

    /**
     * Displays a custom confirmation box.
     * @param {string} message - The confirmation message.
     * @returns {Promise<boolean>} - A promise that resolves to true if 'Yes' is clicked, false otherwise.
     */
    window.showConfirmBox = (message) => {
      return new Promise((resolve) => {
        confirmBoxText.textContent = message;
        showModal(confirmBox);
        resolveConfirm = resolve; // Store the resolve function

        const confirmYes = document.getElementById("confirmYes");
        const confirmNo = document.getElementById("confirmNo");

        // Remove previous listeners to prevent multiple calls
        confirmYes.onclick = null;
        confirmNo.onclick = null;

        confirmYes.onclick = () => {
          hideModal(confirmBox);
          resolveConfirm(true);
        };
        confirmNo.onclick = () => {
          hideModal(confirmBox);
          resolveConfirm(false);
        };
      });
    }

    /**
     * Opens the filter modal.
     */
    window.openFilterModal = () => {
      showModal(filterModal);
    };

    /**
     * Closes the filter modal.
     */
    window.closeFilterModal = () => {
      hideModal(filterModal);
    };

    /**
     * Loads all poster data from Firestore.
     * Displays a loading message and handles errors.
     */
    async function loadData() {
      container.innerHTML = "<p style='text-align:center; color: var(--text-secondary);'><span class='loading-spinner'></span> Loading data...</p>";
      try {
        const snapshot = await getDocs(collection(db, "sharabeswara_poster1"));
        // Ensure dates are formatted consistently upon loading
        allEntries = snapshot.docs.map(doc => ({
          id: doc.id,
          ...doc.data(),
          date: formatDateForInput(doc.data().date) // Format date here
        }));
        applyFilters(); // Apply initial filters (if any) or display all
      } catch (error) {
        console.error("Error loading data: ", error);
        container.innerHTML = "<p style='text-align:center; color: var(--accent-red);'>Failed to load data. Please try again.</p>";
      }
    }

    /**
     * Renders the provided array of data entries into the DOM, either grouped or all.
     * @param {Array} data - The array of poster entries to render.
     */
    function renderData(data) {
      container.innerHTML = ""; // Clear previous content
      if (data.length === 0) {
        container.innerHTML = "<p style='text-align:center; color: var(--text-secondary);'>No posters found matching your criteria.</p>";
        return;
      }

      // Check if a specific date filter is active (meaning we should show all for that date)
      const isSpecificDateFiltered = modalStartDateInput.value && modalStartDateInput.value === modalEndDateInput.value;
      
      let itemsToRender = [];

      if (isSpecificDateFiltered) {
        // If a specific date is filtered, just prepare all entries for rendering
        itemsToRender = data;
      } else {
        // Group entries by date for condensed view
        const groupedByDate = data.reduce((acc, entry) => {
          const date = entry.date;
          if (!acc[date]) {
            acc[date] = [];
          }
          acc[date].push(entry);
          return acc;
        }, {});

        // Sort dates to ensure consistent display order (latest date first)
        const sortedDates = Object.keys(groupedByDate).sort((a, b) => new Date(b) - new Date(a));

        sortedDates.forEach(date => {
          const entriesForDate = groupedByDate[date];
          itemsToRender.push(entriesForDate[0]); // Always add the first entry

          if (entriesForDate.length > 1) {
            const duplicateCount = entriesForDate.length - 1;
            // Add a special item type for duplicate info
            itemsToRender.push({ type: 'duplicate-info', date: date, count: duplicateCount });
          }
        });
      }

      // Append items to the DOM with staggered animation
      itemsToRender.forEach((item, index) => {
        if (item.type === 'duplicate-info') {
          const duplicateDiv = document.createElement("div");
          duplicateDiv.className = "duplicate-info";
          duplicateDiv.setAttribute('onclick', `filterBySpecificDate('${item.date}')`); 
          duplicateDiv.innerHTML = `
        <p>+ ${item.count} more on ${formatDateForDisplay(item.date)}</p>
          `;
          container.appendChild(duplicateDiv);
          // Apply 'show' class after a small delay to trigger animation
          setTimeout(() => duplicateDiv.classList.add('show'), index * 100);
        } else {
          // It's a regular entry card
          const card = appendEntryCard(item); // appendEntryCard now returns the created div
          // Apply 'show' class after a small delay to trigger animation
          setTimeout(() => card.classList.add('show'), index * 100); // 100ms delay per card
        }
      });
    }

    /**
     * Appends a single entry card to the container.
     * @param {Object} entry - The poster entry object.
     * @returns {HTMLElement} The created div element for the entry card.
     */
    function appendEntryCard(entry) {
      const formattedDate = formatDateForInput(entry.date); // Format date for input type="date"
      const div = document.createElement("div");
      div.className = "entry-card"; // Initial state handled by CSS
      div.innerHTML = `
        <div class="entry-header" onclick="toggleContent(this)">
          <strong>${formatDateForDisplay(entry.date)} - ${entry.name}</strong>
          <button class="toggle-btn"><i class="fas fa-chevron-right"></i></button>
        </div>
        <div class="entry-content">
          <div class="form-group">
            <label>Date</label>
            <input type="date" value="${formattedDate}" data-field="date" data-id="${entry.id}">
          </div>
          <div class="form-group">
            <label>Name</label>
            <input type="text" value="${entry.name}" data-field="name" data-id="${entry.id}">
          </div>
          <div class="form-group">
            <label>Address</label>
            <input type="text" value="${entry.address}" data-field="address" data-id="${entry.id}">
          </div>
          <div class="form-group">
            <label>Time</label>
            <input type="text" value="${entry.time}" data-field="time" data-id="${entry.id}">
          </div>
          <div class="form-group">
            <label>Season</label>
            <input type="text" value="${entry.season}" data-field="season" data-id="${entry.id}">
          </div>
          <div class="card-actions">
            <button class="btn update" onclick="updateEntry('${entry.id}')">
              <i class="fas fa-save"></i> Update
            </button>
            <button class="btn danger" onclick="deleteEntry('${entry.id}')">
              <i class="fas fa-trash-alt"></i> Delete
            </button>
          </div>
        </div>
      `;
      container.appendChild(div);
      return div; // Return the created div
    }


    /**
     * Toggles the visibility of an entry's detailed content.
     * @param {HTMLElement} header - The header element of the entry card.
     */
    window.toggleContent = (header) => {
      const card = header.closest(".entry-card");
      const content = card.querySelector(".entry-content");
      const icon = card.querySelector(".toggle-btn i");
      const isExpanded = content.classList.toggle("expanded");
      icon.style.transform = isExpanded ? "rotate(90deg)" : "rotate(0deg)";
    };

    /**
     * Updates an entire entry in Firestore based on the input fields within its card.
     * @param {string} id - The ID of the document to update.
     */
    window.updateEntry = async (id) => {
      const card = document.querySelector(`.entry-card input[data-id="${id}"]`).closest('.entry-card');
      const inputs = card.querySelectorAll('input[data-id]');
      const updates = {};
      let hasChanges = false;

      inputs.forEach(input => {
        const field = input.dataset.field;
        const originalValue = allEntries.find(e => e.id === id)?.[field];
        let newValue = input.value;

        // Special handling for date field: ensure it's stored consistently
        if (field === 'date') {
          newValue = formatDateForInput(newValue); // Format to YYYY-MM-DD before saving
        }

        if (newValue !== originalValue) {
          updates[field] = newValue;
          hasChanges = true;
        }
      });

      if (!hasChanges) {
        showMessageBox("No changes detected to update.");
        return;
      }
      
      try {
        const ref = doc(db, "sharabeswara_poster1", id);
        await updateDoc(ref, updates);
        showMessageBox("Updated successfully!");
        loadData(); // Re-load data to reflect changes and re-apply filters
      } catch (error) {
        showMessageBox("Failed to update: " + error.message);
        console.error("Error updating document: ", error);
      }
    };
    
    /**
     * Deletes an entry from Firestore.
     * @param {string} id - The ID of the document to delete.
     */
    window.deleteEntry = async (id) => {
      const confirmed = await showConfirmBox("Are you sure you want to delete this entry? This action cannot be undone.");
      if (confirmed) {
        try {
          await deleteDoc(doc(db, "sharabeswara_poster1", id));
          showMessageBox("Entry deleted successfully!");
          loadData(); // Re-load data to remove the deleted entry and re-apply filters
        } catch (error) {
          showMessageBox("Failed to delete: " + error.message);
          console.error("Error deleting document: ", error);
        }
      }
    };

    /**
     * Applies both text search and date range filters to the data.
     * Renders the filtered results.
     */
    window.applyFilters = () => {
      let filtered = [...allEntries]; // Start with all data

      // 1. Apply Date Filter (from modal inputs)
      const startDate = modalStartDateInput.value;
      const endDate = modalEndDateInput.value;

      if (startDate && endDate) {
        const start = new Date(startDate);
        const end = new Date(endDate);
        // Set end date to end of the day for inclusive filtering
        end.setHours(23, 59, 59, 999); 

        filtered = filtered.filter(entry => {
          const entryDate = new Date(entry.date);
          return entryDate >= start && entryDate <= end;
        });
      } else if (startDate) {
        const start = new Date(startDate);
        filtered = filtered.filter(entry => new Date(entry.date) >= start);
      } else if (endDate) {
        const end = new Date(endDate);
        end.setHours(23, 59, 59, 999);
        filtered = filtered.filter(entry => new Date(entry.date) <= end);
      }

      // 2. Apply Text Search Filter (from main page input)
      const searchTerm = searchInput.value.toLowerCase();
      if (searchTerm) {
        filtered = filtered.filter(e => 
          e.name.toLowerCase().includes(searchTerm) || 
          e.date.toLowerCase().includes(searchTerm) ||
          e.address.toLowerCase().includes(searchTerm) ||
          e.season.toLowerCase().includes(searchTerm)
        );
      }
      
      currentFilteredEntries = filtered; // Store the currently displayed data
      renderData(currentFilteredEntries);
      closeFilterModal(); // Close modal after applying filters
    };

    /**
     * Resets only the date filter inputs in the modal.
     */
    window.resetDateFilters = () => {
      modalStartDateInput.value = "";
      modalEndDateInput.value = "";
      applyFilters(); // Re-apply filters, which will now show all data (with text search still active if any)
    };

    /**
     * Resets all filters (text search and date filters) and reloads data.
     */
    window.resetAllFilters = () => {
      searchInput.value = ""; // Clear text search input
      modalStartDateInput.value = ""; // Clear modal date inputs
      modalEndDateInput.value = "";
      applyFilters(); // Re-apply filters, which will now show all data in condensed view
    };

    /**
     * Filters the data to show only entries for a specific date.
     * This function is called when clicking on the "+ X more on [Date]" div.
     * @param {string} date - The date to filter by (YYYY-MM-DD).
     */
    window.filterBySpecificDate = (date) => {
      searchInput.value = ""; // Clear text search
      modalStartDateInput.value = date;
      modalEndDateInput.value = date;
      applyFilters(); // This will apply the date filter and re-render
    };


    // Event listener for real-time text search filtering on the main page
    searchInput.addEventListener("input", applyFilters);

    /**
     * Downloads the currently displayed (filtered) data as an Excel file.
     */
    window.downloadExcel = () => {
      if (currentFilteredEntries.length === 0) {
        showMessageBox("No data to download.");
        return;
      }
      const wb = XLSX.utils.book_new();
      const ws = XLSX.utils.json_to_sheet(currentFilteredEntries);
      XLSX.utils.book_append_sheet(wb, ws, "sharabeswara_poster1");
      XLSX.writeFile(wb, "posters.xlsx");
    };

    /**
     * Downloads the currently displayed (filtered) data as a PDF file.
     */
    window.downloadPDF = () => {
      if (currentFilteredEntries.length === 0) {
        showMessageBox("No data to download.");
        return;
      }
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      let y = 10;
      doc.setFontSize(10); // Smaller font for more content per page
      const lineHeight = 7; // Adjusted line height

      currentFilteredEntries.forEach((e, i) => {
        const text = `${i + 1}. Date: ${e.date} | Name: ${e.name} | Address: ${e.address} | Time: ${e.time} | Season: ${e.season}`;
        
        // Check if content exceeds page height, add new page if needed
        if (y + lineHeight > doc.internal.pageSize.height - 10) { 
          doc.addPage();
          y = 10; // Reset y for new page
        }
        doc.text(text, 10, y);
        y += lineHeight;
      });
      doc.save("posters.pdf");
    };

    // Initial data load when the page loads
    loadData();
  </script>
</body>
</html>
