<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Example: HTML Page with iframe</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 0px;
      background: #f8f9fa;
      text-align: center;
    }

    h2 {
      color: #333;
    }

    iframe {
      border: 1px solid #ccc;
      border-radius: 8px;
      box-shadow: 0px 2px 8px rgba(0, 0, 0, 0.1);
    }

    .controls {
      margin-top: 5px;
      margin-bottom: 5px;
      display: inline-flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      background: #fff;
      padding: 12px 20px;
      border-radius: 8px;
      box-shadow: 0px 2px 8px rgba(0, 0, 0, 0.1);
    }

    .controls label {
      font-weight: 500;
    }

    .controls input {
      width: 80px;
      padding: 5px;
      border: 1px solid #ccc;
      border-radius: 4px;
      text-align: center;
    }

    .controls button {
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      background-color: #007bff;
      color: white;
      cursor: pointer;
      font-size: 14px;
      transition: 0.3s;
    }

    .controls button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>

  <h2>Embedded Content with iframe</h2>

  <!-- Controls -->
  <div class="controls">
    <label for="width">Width:</label>
    <input type="number" id="width" value="360">

    <label for="height">Height:</label>
    <input type="number" id="height" value="664">

    <label for="interval">Auto Refresh (sec):</label>
    <input type="number" id="interval" value="5">

    <button onclick="updateIframeSize()">Set Size</button>
    <button onclick="refreshIframe()">Refresh</button>
    <button onclick="startAutoRefresh()">Start Auto</button>
    <button onclick="stopAutoRefresh()">Stop Auto</button>
  </div>

  <!-- Iframe -->
  <iframe 
    id="myIframe"
    src="annapoorna1.html"
    width="360"
    height="664"
    title="Example Website"
    allowfullscreen>
  </iframe>

  <script>
    let autoRefreshInterval = null;
    let lastModified = null;
    const iframe = document.getElementById("myIframe");
    const fileUrl = "annapoorna1.html";

    function updateIframeSize() {
      iframe.width = document.getElementById("width").value;
      iframe.height = document.getElementById("height").value;
    }

    function refreshIframe() {
      iframe.src = iframe.src;
    }

    async function checkFileUpdate() {
      try {
        const response = await fetch(fileUrl, { method: "HEAD", cache: "no-cache" });
        const modified = response.headers.get("Last-Modified");
        if (lastModified && modified !== lastModified) {
          refreshIframe();
        }
        lastModified = modified;
      } catch (err) {
        console.error("Error checking file update:", err);
      }
    }

    function startAutoRefresh() {
      stopAutoRefresh(); // Clear if already running
      const seconds = parseInt(document.getElementById("interval").value) * 1000;
      autoRefreshInterval = setInterval(() => {
        checkFileUpdate(); // Check for file change
        refreshIframe();   // Refresh anyway at interval
      }, seconds);
    }

    function stopAutoRefresh() {
      if (autoRefreshInterval) {
        clearInterval(autoRefreshInterval);
        autoRefreshInterval = null;
      }
    }
  </script>

</body>
</html>
