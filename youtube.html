<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic YouTube Slider</title>
    <style>
        .slider-container {
            max-width: 800px;
            margin: 50px auto;
            position: relative;
            height: 520px; /* Increased height for info area */
            overflow: hidden;
            border-radius: 12px;
        }

        .video-card {
            position: absolute;
            top: 0; left: 0; width: 100%;
            background: #1e1e1e;
            text-decoration: none;
            color: white;
            border: 1px solid #333;
            border-radius: 12px;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateX(100%);
        }

        .video-card.active { transform: translateX(0); z-index: 10; }
        .video-card.prev { transform: translateX(-100%); z-index: 5; }

        .thumb-box {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background: #000;
        }

        .thumb-box img {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
        }

        .video-info { padding: 25px; text-align: center; }
        .video-title { font-size: 1.3rem; font-weight: bold; display: block; margin-bottom: 8px; color: #fff; }
        .channel-name { color: white; font-size: 0.9rem; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="slider-container" id="slider">
        </div>

    <script>
        const slider = document.getElementById('slider');
        let currentSlide = 0;
        let slides = [];

        // Function to extract Video ID from various YouTube URL formats
        function getYouTubeID(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        // 1. Fetch the JSON data
        fetch('videos.json')
            .then(response => response.json())
            .then(data => {
                renderSlides(data);
                startAutoPlay();
            })
            .catch(error => console.error('Error loading videos:', error));

        // 2. Create the HTML for each slide
        function renderSlides(videoData) {
            videoData.forEach((video, index) => {
                const videoId = getYouTubeID(video.url);
                const thumbUrl = `https://i.ytimg.com/vi/${videoId}/maxresdefault.jpg`;

                const card = document.createElement('a');
                card.href = video.url;
                card.target = "_blank";
                card.className = 'video-card';
                if (index === 0) card.classList.add('active');

                card.innerHTML = `
                    <div class="thumb-box">
                        <img src="${thumbUrl}" alt="${video.title}">
                    </div>
                    <div class="video-info">
                        <span class="video-title">${video.title}</span>
                        <span class="channel-name">${video.channel}</span>
                    </div>
                `;
                
                slider.appendChild(card);
            });

            // Update the global slides array
            slides = document.querySelectorAll('.video-card');
        }

        // 3. Animation Logic
        function showNextSlide() {
            if (slides.length === 0) return;

            slides[currentSlide].classList.remove('active');
            slides[currentSlide].classList.add('prev');

            const oldSlide = currentSlide;
            currentSlide = (currentSlide + 1) % slides.length;

            slides[currentSlide].classList.remove('prev');
            slides[currentSlide].classList.add('active');

            setTimeout(() => {
                slides[oldSlide].classList.remove('prev');
            }, 800);
        }

        function startAutoPlay() {
            setInterval(showNextSlide, 4000);
        }
    </script>

</body>
</html>
