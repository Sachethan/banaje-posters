<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bhajane - Template Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { dark: { 900: '#0f172a', 800: '#1e293b', 700: '#334155' } }
                }
            }
        }
    </script>
    <style>
/* --- Main Studio CSS --- */
body { 
    font-family: 'Inter', sans-serif; 
    -webkit-font-smoothing: antialiased; 
}

/* Custom Scrollbar for the Gallery Grid */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: #0f172a; }
::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }

.spinner { 
    width: 40px; height: 40px; 
    border: 3px solid rgba(99, 102, 241, 0.3); 
    border-radius: 50%; border-top-color: #6366f1; 
    animation: spin 0.8s ease-in-out infinite; 
}

@keyframes spin { to { transform: rotate(360deg); } }

.template-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
.template-card:hover { transform: translateY(-4px); border-color: #6366f1; }

.text-gradient { 
    background-clip: text; 
    -webkit-background-clip: text; 
    -webkit-text-fill-color: transparent; 
    background-image: linear-gradient(to right, #818cf8, #c084fc, #22d3ee); 
}

footer { text-align: center; padding: 40px; color: #666; }

/* Hiding the Iframe Scrollbar via Clipping */
#iframe-container {
    overflow: hidden; /* This acts as a mask */
    position: absolute;
    inset: 0;
    z-index: 40;
}

#viewer {
    /* Push the scrollbar 20px off-screen to the right */
    width: calc(100% + 20px); 
    height: 100%;
    border: none;
}
</style>
</head>
<body class="bg-dark-900 text-slate-200 flex flex-col h-screen overflow-hidden">

    <header class="h-16 flex-shrink-0 z-30 relative border-b border-slate-700/50 bg-dark-900/90 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-4 h-full flex items-center justify-between relative">
            <div class="flex items-center gap-4">
                <div id="branding-container">
                    <h1 class="text-sm font-bold text-white">Bhajane <span class="text-gradient">Templates</span></h1>
                </div>
            </div>
            <div id="editor-nav" class="hidden text-xs bg-slate-800/50 px-3 py-1.5 rounded-full border border-slate-700">
                <span id="template-breadcrumb" class="text-indigo-400 font-semibold ml-1 tracking-wide inline-block align-bottom truncate max-w-[50px]">Untitled</span>
            </div>
           <button id="back-to-gallery-btn" class="hidden m-4 items-center gap-2 px-3 py-1.5 bg-slate-800 text-slate-300 text-sm rounded-lg border border-slate-700">
           Back
           </button>
                   <div class="text-xs">
        <span class="text-indigo-400 font-semibold ml-1">SSC.</span>
        </div>
        </div>

    </header>

    <main class="flex-grow relative overflow-hidden bg-gradient-to-br from-dark-900 to-slate-900">
        <div id="template-selector" class="h-full overflow-y-auto">
            <div class="max-w-7xl mx-auto px-4 py-10">
                <div id="template-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"></div>
            </div>
        </div>

        <div id="iframe-container" class="hidden absolute inset-0 bg-dark-900 z-40">
            <div id="loading-overlay" class="absolute inset-0 bg-dark-900/95 flex items-center justify-center z-50">
                <div class="flex flex-col items-center">
                    <div class="spinner mb-4"></div>
                    <p class="text-slate-300 animate-pulse">Opening Editor...</p>
                </div>
            </div>
            <iframe id="viewer" src="about:blank" class="w-full h-full border-0"></iframe>
        </div>
    </main>
<footer>&copy; 2026 Sachethan Salian Creation</footer>
    <script>
        const templates = [
            { id: '1', title: 'ಅನ್ನಪೂರ್ಣ ಆಶೀರ್ವಾದ', previewImage: 'annapoorna/image/preview.jpg', url: 'annapoorna/annapoorna1.html' },
            { id: '2', title: 'ಶ್ರೀ ಶರಭೇಶ್ವರ ಭಜನೆ', previewImage: 'sharabeswara/image/preview.png', url: 'sharabeswara/sharabeswara.html' }
        ];

        const grid = document.getElementById('template-grid');
        const viewer = document.getElementById('viewer');
        const selector = document.getElementById('template-selector');
        const container = document.getElementById('iframe-container');
        const loader = document.getElementById('loading-overlay');
        const backBtn = document.getElementById('back-to-gallery-btn');
        const nav = document.getElementById('editor-nav');
        const breadcrumb = document.getElementById('template-breadcrumb');

        function render() {
            templates.forEach(t => {
                const card = document.createElement('div');
                card.className = 'template-card bg-dark-800 border border-slate-700 rounded-xl overflow-hidden cursor-pointer p-4';
                card.innerHTML = `
                    <img src="${t.previewImage}" class="w-full h-40 object-cover rounded-lg mb-4" onerror="this.src='https://placehold.co/400x225/1e293b/6366f1?text=Template'">
                    <h3 class="text-white font-bold mb-3">${t.title}</h3>
                    <button class="w-full py-2 bg-indigo-600 hover:bg-indigo-500 rounded-lg text-sm font-semibold transition">Open Editor</button>
                `;
                card.onclick = () => {
                    loader.classList.remove('hidden');
                    selector.classList.add('hidden');
                    container.classList.remove('hidden');
                    backBtn.classList.remove('hidden');
                    nav.classList.remove('hidden');
                    breadcrumb.textContent = t.title;
                    viewer.src = t.url;
                };
                grid.appendChild(card);
            });
        }

        backBtn.onclick = () => {
            viewer.src = 'about:blank';
            selector.classList.remove('hidden');
            container.classList.add('hidden');
            backBtn.classList.add('hidden');
            nav.classList.add('hidden');
        };

        viewer.onload = () => loader.classList.add('hidden');
        render();
    </script>
</body>
</html>
